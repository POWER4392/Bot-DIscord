services:
  - type: web
    name: discord-bot-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: PORT
        value: 8080
      - key: RENDER
        value: true
