version: '3.8'

services:
  # Cơ sở dữ liệu PostgreSQL cho môi trường chạy thử cục bộ
  postgres:
    image: postgres:15-alpine
    container_name: bot-postgres-local
    restart: always
    environment:
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_password_2026
      POSTGRES_DB: bot_discord_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Dịch vụ bộ nhớ đệm Redis phục vụ lưu trữ blacklist/session/cache
  redis:
    image: redis:7-alpine
    container_name: bot-redis-local
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
